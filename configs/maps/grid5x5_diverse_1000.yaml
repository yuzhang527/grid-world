schema_version: "1.0"
generation_mode: diverse

# Dataset identity and size
prefix: D5_ep
dataset_seed: 20260715
seed_start: 10000
num_episodes: 1000
size: 5

# Randomized start/goal distribution. The four diagonal direction classes are
# allocated equally, removing the fixed UP/RIGHT bias of [0,0] -> [4,4].
direction_classes: [NE, NW, SE, SW]
direction_weights:
  NE: 1
  NW: 1
  SE: 1
  SW: 1
min_manhattan_distance: 4
max_manhattan_distance: 8

# Difficulty is defined by obstacle count and the detour relative to Manhattan
# distance. On a four-neighbor grid, useful detours usually occur in steps of 2.
difficulty_buckets:
  - name: easy
    weight: 0.30
    obstacle_counts: [2, 3]
    min_detour: 0
    max_detour: 0

  - name: medium
    weight: 0.45
    obstacle_counts: [4, 5, 6]
    min_detour: 2
    max_detour: 2

  - name: hard
    weight: 0.25
    obstacle_counts: [6, 7, 8]
    min_detour: 4
    max_detour: null

require_unique_shortest_path: false
max_attempts_per_episode: 50000
